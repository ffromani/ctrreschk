name: CI E2E

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  e2e-align:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up golang
      uses: actions/setup-go@v5
      with:
        go-version: "1.25"

    - name: Kind version check
      run: kind version

    - name: Create and setup kind cluster
      run: make ci-kind-setup

    - name: Run E2E tests
      run: KUBECONFIG=${HOME}/.kube/config make test-e2e

    - name: Show pods on failure
      if: ${{ failure() }}
      run: |
        kubectl get pods -A -o wide
